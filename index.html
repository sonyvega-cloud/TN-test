<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TN Graphics Engine</title>
<!-- TN LAUNCHER — template picker + saved projects -->

<style>
  :root {
    --tn-red: #e60013;
    --tn-red-dk: #b80010;
    --tn-red-sft: #ffeeef;
    --bg-0: #ffffff;
    --bg-1: #f7f7f7;
    --bg-2: #eeeeee;
    --bg-3: #1a1a1a;
    --line: #e2e2e2;
    --line-2: #d4d4d4;
    --text-0: #0f0f0f;
    --text-1: #4a4a4a;
    --text-2: #8a8a8a;
    --text-inv: #ffffff;
    --ok: #00a651;
    --font-ui: 'Inter', system-ui, -apple-system, sans-serif;
    --font-mono: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-ui);
    background: var(--bg-1);
    color: var(--text-0);
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ===== Masthead (same red bar as template pages) ===== */
  .masthead {
    background: var(--tn-red);
    border-bottom: 4px solid var(--tn-red-dk);
    padding: 24px 48px;
    color: var(--text-inv);
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .tn-mark {
    width: 36px; height: 36px;
    background: var(--text-inv);
    color: var(--tn-red);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 16px;
    letter-spacing: -0.02em;
  }
  .masthead .title {
    font-weight: 800;
    font-size: 20px;
    letter-spacing: -0.01em;
  }
  .masthead .sub {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    opacity: 0.82;
    margin-left: auto;
  }

  /* ===== Layout ===== */
  .page {
    max-width: 1440px;
    margin: 0 auto;
    padding: 48px;
    display: grid;
    grid-template-columns: 1fr 420px;
    gap: 48px;
  }
  @media (max-width: 1100px) {
    .page { grid-template-columns: 1fr; }
  }

  .section-label {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.22em;
    color: var(--text-1);
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  .section-label .count {
    color: var(--text-2);
    font-size: 10px;
    background: var(--bg-2);
    padding: 2px 8px;
    border-radius: 2px;
    letter-spacing: 0.1em;
  }

  /* ===== Template grid ===== */
  .tpl-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
  }
  @media (max-width: 720px) {
    .tpl-grid { grid-template-columns: 1fr; }
  }

  .tpl-card {
    background: var(--bg-0);
    border: 1px solid var(--line);
    border-radius: 4px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.18s;
    display: flex;
    flex-direction: column;
    text-decoration: none;
    color: inherit;
  }
  .tpl-card:hover:not(.coming) {
    border-color: var(--tn-red);
    transform: translateY(-2px);
    box-shadow: 0 12px 32px rgba(230,0,19,0.08), 0 2px 4px rgba(0,0,0,0.04);
  }
  .tpl-card.coming {
    opacity: 0.55;
    cursor: not-allowed;
  }

  .tpl-preview {
    aspect-ratio: 16 / 9;
    background: var(--bg-3);
    position: relative;
    overflow: hidden;
    border-bottom: 1px solid var(--line);
  }
  .tpl-preview iframe {
    position: absolute;
    top: 0; left: 0;
    width: 1920px; height: 1080px;
    transform-origin: top left;
    border: none;
    pointer-events: none;
  }
  .tpl-preview .placeholder {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    gap: 10px;
    color: #5a5a5a;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    background:
      repeating-linear-gradient(
        45deg,
        #1f1f1f 0 12px,
        #232323 12px 24px
      );
  }
  .tpl-preview .placeholder svg {
    width: 56px; height: 56px;
    opacity: 0.35;
  }

  .tpl-body {
    padding: 16px 18px 18px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .tpl-head-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 4px;
  }
  .tpl-num {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.22em;
    color: var(--text-2);
    text-transform: uppercase;
  }
  .tpl-status {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 3px 7px;
    border-radius: 2px;
  }
  .tpl-status.ready {
    background: var(--tn-red);
    color: #fff;
  }
  .tpl-status.soon {
    background: var(--bg-2);
    color: var(--text-2);
  }
  .tpl-name {
    font-weight: 800;
    font-size: 19px;
    letter-spacing: -0.01em;
    line-height: 1.2;
  }
  .tpl-desc {
    font-size: 13px;
    color: var(--text-1);
    line-height: 1.45;
    margin-top: 2px;
  }

  /* ===== Recent projects ===== */
  .recents {
    background: var(--bg-0);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 24px;
    height: fit-content;
    position: sticky;
    top: 48px;
  }
  .recents-empty {
    padding: 32px 8px;
    text-align: center;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--text-2);
    text-transform: uppercase;
  }
  .recents-empty .big {
    font-size: 13px;
    color: var(--text-1);
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }

  .proj-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .proj-item {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
    align-items: center;
    padding: 12px 14px;
    background: var(--bg-1);
    border: 1px solid transparent;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .proj-item:hover {
    background: var(--tn-red-sft);
    border-color: var(--tn-red);
  }
  .proj-item.disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .proj-item.disabled:hover {
    background: var(--bg-1);
    border-color: transparent;
  }
  .proj-badge {
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.14em;
    padding: 4px 8px;
    background: var(--tn-red);
    color: #fff;
    border-radius: 2px;
    white-space: nowrap;
  }
  .proj-badge.soon {
    background: var(--bg-2);
    color: var(--text-2);
  }
  .proj-info { min-width: 0; }
  .proj-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-0);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .proj-date {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-2);
    margin-top: 2px;
  }
  .proj-del {
    background: transparent;
    border: 1px solid var(--line-2);
    color: var(--text-2);
    font-family: var(--font-mono);
    font-size: 11px;
    width: 26px; height: 26px;
    cursor: pointer;
    border-radius: 2px;
    line-height: 1;
  }
  .proj-del:hover {
    border-color: var(--tn-red);
    background: var(--tn-red);
    color: #fff;
  }

  /* ===== Footer note ===== */
  .foot {
    max-width: 1440px;
    margin: 0 auto;
    padding: 0 48px 48px;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--text-2);
  }
</style>
<script src="login.js"></script>
<script src="projects.js"></script>
</head>
<body>

<header class="masthead">
  <span class="tn-mark">TN</span>
  <span class="title">Graphics Engine</span>
  <span class="sub">Televizní Noviny · Template Library</span>
</header>

<main class="page">
  <!-- LEFT: templates -->
  <section>
    <div class="section-label">
      New project · pick a template
      <span class="count" id="tplCount">6 templates</span>
    </div>
    <div class="tpl-grid" id="tplGrid"></div>
  </section>

  <!-- RIGHT: recent projects -->
  <aside>
    <div class="section-label">
      Recent projects
      <span class="count" id="projCount">0</span>
    </div>
    <div class="recents" id="recents">
      <div class="recents-empty">
        <div class="big">No saved projects</div>
        Pick a template to start
      </div>
    </div>
  </aside>
</main>

<footer class="foot">
  <span>TN · Graphics Engine v0.8</span>
</footer>

<script>
// TN Login — gate UI on login. Badge in masthead; logout reloads.
TNLogin.requireLogin().then(nick => {
  console.log('[index] logged in as', nick);
  TNLogin.attachBadge(document.querySelector('.masthead'), {
    onChange: () => { window.location.reload(); }   // reload so projects re-filter etc.
  });
});


/* ==================== TEMPLATE REGISTRY ==================== */
const TEMPLATES = [
  {
    id: 'bar-chart-01',
    num: '01',
    name: 'Bar Chart',
    desc: 'Sloupcový graf s časovou řadou a anotovanými hodnotami. Produkčně použito pro Televizní Noviny.',
    url: 'templates/bar-chart.html',
    previewFrame: 49,
    ready: true,
  },
  {
    id: 'line-chart-01',
    num: '02',
    name: 'Line Chart',
    desc: 'Trend / časová řada jako křivka. Ideální pro srovnání víc období bez kategorizace.',
    url: 'templates/tn-line-chart.html',
    previewUrl: 'templates/tn-line-chart.html?preview=1&frame=49',
    ready: true,
  },
  {
    id: 'pie-chart-01',
    num: '03',
    name: 'Pie / Donut',
    desc: 'Podíly segmentů na celku. 3–6 kategorií, ostatní v "other" řezu.',
    url: 'templates/tn-donut.html',
    previewUrl: 'templates/tn-donut.html?preview=1&frame=49',
    ready: true,
  },
  {
    id: 'stacked-bar-01',
    num: '04',
    name: 'Vodorovný graf',
    desc: 'Horizontální bar chart pro srovnání hodnot mezi kategoriemi.',
    url: 'templates/tn-hbar.html',
    previewUrl: 'templates/tn-hbar.html?preview=1&frame=49',
    ready: true,
  },
  {
    id: 'table-01',
    num: '05',
    name: 'Tabulka',
    desc: 'Výsledkový žebříček, tabulka s fade-in řádky a zvýrazněním top N.',
    url: 'templates/tn-tabulka.html',
    previewUrl: 'templates/tn-tabulka.html?preview=1&frame=49',
    ready: true,
  },
  {
    id: 'tn-citace-01',
    num: '06',
    name: 'TN citace',
    desc: 'Citát s fotografií, jménem a funkcí. Světlá karta na Nova TN pozadí s registračními značkami.',
    url: 'templates/tn-citace.html',
    previewUrl: 'templates/tn-citace.html?preview=1&frame=60',
    ready: true,
  },
  {
    id: 'identikit-01',
    num: '07',
    name: 'Identikit',
    desc: 'Identifikační karta osoby s fotografií, jménem, popisem a kontextem.',
    url: 'templates/tn-identikit.html',
    previewUrl: 'templates/tn-identikit.html?preview=1&frame=49',
    ready: true,
  },
  {
    id: 'kartoteka-01',
    num: '08',
    name: 'Kartotéka',
    desc: 'Vícebloková kartotéka s portrétem a popisem — biografie, profily, medailonky.',
    url: 'templates/tn-kartoteka.html',
    previewUrl: 'templates/tn-kartoteka.html?preview=1&frame=49',
    ready: true,
  },
];

/* ==================== STORAGE ==================== */
// Shared registry — each record carries its template id so all templates
// can coexist in one localStorage key.
const LS_KEY = 'tn_graphics_engine_projects_v2';
const LS_CURRENT = 'tn_graphics_engine_current_v2';
const LS_LEGACY_KEYS = ['tn_graphics_engine_projects_v1']; // migrated on first read

function loadAllProjects() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) return JSON.parse(raw) || [];
  } catch (_) {}
  // Migrate from v1 if present
  for (const legacy of LS_LEGACY_KEYS) {
    try {
      const raw = localStorage.getItem(legacy);
      if (raw) {
        const arr = JSON.parse(raw) || [];
        // v1 projects are all bar-chart; ensure template id is set in state
        arr.forEach(p => {
          if (p.state && !p.state.template) p.state.template = 'bar-chart-01';
        });
        localStorage.setItem(LS_KEY, JSON.stringify(arr));
        return arr;
      }
    } catch (_) {}
  }
  return [];
}

function saveAllProjects(arr) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(arr)); } catch (_) {}
}

function deleteProject(id) {
  const arr = loadAllProjects().filter(p => p.id !== id);
  saveAllProjects(arr);
  if (localStorage.getItem(LS_CURRENT) === id) localStorage.removeItem(LS_CURRENT);
  renderRecents();
}

function openProject(p) {
  const tpl = TEMPLATES.find(t => t.id === (p.state?.template || 'bar-chart-01'));
  if (!tpl || !tpl.ready) {
    alert(`Template "${p.state?.template}" is not available yet.`);
    return;
  }
  localStorage.setItem(LS_CURRENT, p.id);
  window.location.href = `${tpl.url}?project=${encodeURIComponent(p.id)}`;
}

/* ==================== RENDER: TEMPLATES ==================== */
function renderTemplates() {
  const grid = document.getElementById('tplGrid');
  document.getElementById('tplCount').textContent = `${TEMPLATES.length} templates`;
  grid.innerHTML = TEMPLATES.map(t => {
    const preview = t.ready
      ? `<iframe src="${t.url}?preview=1&frame=${t.previewFrame ?? 49}" loading="lazy" title="${t.name} preview"></iframe>`
      : `<div class="placeholder">
           <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
             <rect x="3" y="3" width="18" height="18" rx="2"/>
             <path d="M8 14l3-3 2 2 3-4"/>
           </svg>
           Coming soon
         </div>`;
    return `
      <a class="tpl-card ${t.ready ? '' : 'coming'}"
         ${t.ready ? `href="${t.url}"` : ''}
         data-id="${t.id}">
        <div class="tpl-preview" data-id="${t.id}">${preview}</div>
        <div class="tpl-body">
          <div class="tpl-head-row">
            <span class="tpl-num">Template ${t.num}</span>
            <span class="tpl-status ${t.ready ? 'ready' : 'soon'}">${t.ready ? 'Ready' : 'Soon'}</span>
          </div>
          <div class="tpl-name">${t.name}</div>
          <div class="tpl-desc">${t.desc}</div>
        </div>
      </a>`;
  }).join('');

  // After iframes load, scale them to fit the card preview area
  grid.querySelectorAll('.tpl-preview iframe').forEach(fitIframe);
  window.addEventListener('resize', () => grid.querySelectorAll('.tpl-preview iframe').forEach(fitIframe));

  // Prevent coming-soon clicks
  grid.querySelectorAll('.tpl-card.coming').forEach(card => {
    card.addEventListener('click', e => { e.preventDefault(); });
  });
}

function fitIframe(iframe) {
  const parent = iframe.parentElement;
  const w = parent.clientWidth;
  const scale = w / 1920;
  iframe.style.transform = `scale(${scale})`;
}

/* ==================== RENDER: RECENT PROJECTS ==================== */
function renderRecents() {
  const host = document.getElementById('recents');
  const all = loadAllProjects().sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
  document.getElementById('projCount').textContent = String(all.length);

  if (all.length === 0) {
    host.innerHTML = `<div class="recents-empty">
      <div class="big">No saved projects</div>
      Pick a template to start
    </div>`;
    return;
  }

  host.innerHTML = `<div class="proj-list">${all.map(p => {
    const tplId = p.state?.template || 'bar-chart-01';
    const tpl = TEMPLATES.find(t => t.id === tplId);
    const badge = tpl ? `${tpl.num} ${tpl.name.split(' ')[0].toUpperCase()}` : tplId.toUpperCase();
    const badgeCls = tpl?.ready ? '' : 'soon';
    const d = new Date(p.updatedAt || 0);
    const dateStr = d.toLocaleString('cs-CZ', {
      day: '2-digit', month: '2-digit', year: 'numeric',
      hour: '2-digit', minute: '2-digit',
    });
    const disabled = !tpl?.ready;
    return `<div class="proj-item ${disabled ? 'disabled' : ''}" data-id="${p.id}">
      <span class="proj-badge ${badgeCls}">${escapeHtml(badge)}</span>
      <div class="proj-info">
        <div class="proj-title">${escapeHtml(p.name || 'Untitled')}</div>
        <div class="proj-date">${dateStr}</div>
      </div>
      <button class="proj-del" data-id="${p.id}" title="Delete">×</button>
    </div>`;
  }).join('')}</div>`;

  host.querySelectorAll('.proj-item').forEach(item => {
    item.addEventListener('click', e => {
      if (e.target.classList.contains('proj-del')) return;
      if (item.classList.contains('disabled')) return;
      const id = item.dataset.id;
      const p = loadAllProjects().find(x => x.id === id);
      if (p) openProject(p);
    });
  });
  host.querySelectorAll('.proj-del').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = btn.dataset.id;
      const p = loadAllProjects().find(x => x.id === id);
      if (p && confirm(`Delete "${p.name}"?`)) deleteProject(id);
    });
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}


// === Storage projects bridge (currently localStorage-only via TNProjects) ===
// Reads via TNProjects.list() which currently uses localStorage. When you
// re-enable cloud sync (see projects.js), this same function will pull from
// the Cloudflare Worker without code changes here.
async function refreshFromStorage() {
  if (!window.TNProjects) return;
  try {
    const cloud = await TNProjects.list();
    // Convert cloud index entries to the same shape renderRecents expects
    // (i.e. { id, name, updatedAt, state: { template } }).
    const merged = cloud.map(p => ({
      id: p.id,
      name: p.name,
      owner: p.owner,
      updatedAt: new Date(p.updatedAt || 0).getTime(),
      state: { template: p.template },
      __cloud: true,
    }));
    saveAllProjects(merged);
    renderRecents();
  } catch (err) {
    console.warn('[cloud] refresh failed:', err.message);
  }
}

// Override openProject to load from cloud + use ?projectId= URL param
const _origOpenProject = openProject;
window.openProject = function (p) {
  const tplId = p.state?.template || 'bar-chart-01';
  const tpl = TEMPLATES.find(t => t.id === tplId);
  if (!tpl || !tpl.ready) {
    alert(`Template "${tplId}" is not available yet.`);
    return;
  }
  // Templates' bridge looks for ?projectId= and calls TNProjects.load()
  window.location.href = `${tpl.url}?projectId=${encodeURIComponent(p.id)}`;
};

// Override deleteProject to also remove from cloud
const _origDeleteProject = deleteProject;
window.deleteProject = async function (id) {
  if (window.TNProjects) {
    try { await TNProjects.delete(id); }
    catch (err) { console.warn('[cloud] delete failed:', err); }
  }
  _origDeleteProject(id);
};

/* ==================== BOOT ==================== */
renderTemplates();
renderRecents();      // immediate (legacy localStorage)
refreshFromStorage(); // refresh via TNProjects (currently localStorage)

// Re-render recents when returning from template (bfcache case)
window.addEventListener('pageshow', () => {
  renderRecents();
  refreshFromStorage();
});
</script>
</body>
</html>
